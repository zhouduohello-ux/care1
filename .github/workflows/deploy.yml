name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      staging_api_base_url:
        description: "Staging API base URL (overrides STAGING_API_BASE_URL secret)"
        required: false
        type: string
      test_tool_api_key:
        description: "Test-tool API key for staging (overrides TEST_TOOL_API_KEY secret)"
        required: false
        type: string

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:latest
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Optional: trigger a Render deploy hook after the image is pushed.
      # Set RENDER_API_DEPLOY_HOOK_URL and/or RENDER_WEB_DEPLOY_HOOK_URL secrets
      # in the repository to enable automatic re-deploy. If you use the Render
      # Blueprint (infra/render.yaml), Render auto-deploys on every push and
      # these hooks are optional.
      - name: Trigger Render API deploy hook
        env:
          HOOK_URL: ${{ secrets.RENDER_API_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$HOOK_URL" ]; then
            curl -X POST "$HOOK_URL"
          else
            echo "No RENDER_API_DEPLOY_HOOK_URL configured; skipping API deploy hook"
          fi

      - name: Trigger Render Web deploy hook
        env:
          HOOK_URL: ${{ secrets.RENDER_WEB_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$HOOK_URL" ]; then
            curl -X POST "$HOOK_URL"
          else
            echo "No RENDER_WEB_DEPLOY_HOOK_URL configured; skipping Web deploy hook"
          fi

      # Optional: run the staging E2E smoke suite against the deployed API.
      # Required secrets:
      #   - STAGING_API_BASE_URL (e.g. https://carememory-api-staging.onrender.com)
      #   - TEST_TOOL_API_KEY      (must match the staging API service env var)
      # The staging API service must have ENABLE_TEST_TOOL=true and
      # TEST_TOOL_API_KEY set. Never enable the test tool on production.
      - name: Run staging E2E smoke tests
        env:
          API_BASE_URL: ${{ inputs.staging_api_base_url || secrets.STAGING_API_BASE_URL }}
          TEST_TOOL_API_KEY: ${{ inputs.test_tool_api_key || secrets.TEST_TOOL_API_KEY }}
        run: |
          if [ -z "$API_BASE_URL" ]; then
            echo "No STAGING_API_BASE_URL configured; skipping staging smoke tests"
            exit 0
          fi
          if [ -z "$TEST_TOOL_API_KEY" ]; then
            echo "STAGING_API_BASE_URL is set but TEST_TOOL_API_KEY is missing; skipping staging smoke tests"
            exit 0
          fi

          pnpm install --frozen-lockfile

          echo "Waiting for $API_BASE_URL/health to report ok..."
          for i in {1..60}; do
            if curl -sf "$API_BASE_URL/health" > /dev/null 2>&1; then
              echo "API is healthy"
              break
            fi
            echo -n "."
            sleep 5
          done

          pnpm test:e2e:staging
